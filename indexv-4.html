<!DOCTYPE html>
<html lang="id" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<title>Daftar Hadir Pengajian Digital</title>
<meta name="theme-color" content="#0b3d2c">
<meta name="description" content="Aplikasi daftar hadir pengajian digital berbasis QR Code">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='75' x='10' font-size='70'%3E%F0%9F%95%8C%EF%B8%8F%3C/text%3E%3C/svg%3E">
<!-- Libraries loaded from CDN (only used when device is online: QR/Barcode rendering, PDF/Excel export). Core app + data works fully offline via LocalStorage. -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/JsBarcode/3.11.6/JsBarcode.all.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jsQR/1.4.0/jsQR.js"></script>
<style>
/* ===================== DESIGN TOKENS ===================== */
:root[data-theme="dark"]{
  --bg:#07241b; --bg-2:#0b3d2c; --bg-grad:linear-gradient(160deg,#0d4230 0%,#062219 65%,#04140e 100%);
  --card:#0e3a2b; --card-2:#0f4433; --surface:rgba(255,255,255,.06); --surface-strong:rgba(255,255,255,.1);
  --text:#eef7f1; --text-dim:#a9c9ba; --text-faint:#6f9482;
  --primary:#1f9463; --primary-dark:#0e5c3d; --primary-light:#39b382;
  --gold:#d8b25c; --gold-dark:#a9822f;
  --border:rgba(255,255,255,.13); --border-soft:rgba(255,255,255,.07);
  --danger:#e2685f; --warn:#e0a63c; --success:#2fbf71; --info:#4d9de0;
  --shadow:0 10px 30px rgba(0,0,0,.35);
}
:root[data-theme="light"]{
  --bg:#f6f4ec; --bg-2:#eef2ec; --bg-grad:linear-gradient(160deg,#f8f6ee 0%,#eef2ea 100%);
  --card:#ffffff; --card-2:#fbfaf5; --surface:rgba(15,60,45,.045); --surface-strong:rgba(15,60,45,.08);
  --text:#123527; --text-dim:#4d6b5c; --text-faint:#83a091;
  --primary:#146a45; --primary-dark:#0e5136; --primary-light:#1f8f5f;
  --gold:#a9822f; --gold-dark:#8a6a24;
  --border:rgba(15,60,45,.14); --border-soft:rgba(15,60,45,.08);
  --danger:#c94b42; --warn:#b5791f; --success:#1f9d5f; --info:#2b74b0;
  --shadow:0 10px 24px rgba(20,50,40,.12);
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;height:100%;}
body{
  font-family:'Segoe UI',system-ui,-apple-system,Roboto,sans-serif;
  background:var(--bg); color:var(--text);
  min-height:100vh; overscroll-behavior:none;
}
::selection{background:var(--gold);color:#111;}
button,input,select,textarea{font-family:inherit;}
#appShell{max-width:480px;margin:0 auto;min-height:100vh;background:var(--bg-grad);position:relative;display:flex;flex-direction:column;}
.screen{flex:1;display:flex;flex-direction:column;animation:fadeIn .25s ease;padding-bottom:86px;}
.screen.no-nav{padding-bottom:0;}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}

/* Topbar */
.topbar{display:flex;align-items:center;gap:10px;padding:16px 16px 10px;position:sticky;top:0;z-index:20;
  background:linear-gradient(var(--bg-2), transparent); backdrop-filter:blur(6px);}
.topbar h1{font-size:17px;margin:0;font-weight:700;flex:1;letter-spacing:.2px;}
.icon-btn{width:38px;height:38px;border-radius:12px;border:1px solid var(--border);background:var(--surface);
  color:var(--text);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;flex-shrink:0;}
.icon-btn:active{transform:scale(.94);}

/* Cards / glass */
.card{background:var(--card);border:1px solid var(--border-soft);border-radius:18px;padding:16px;box-shadow:var(--shadow);}
.glass{background:var(--surface);backdrop-filter:blur(14px);border:1px solid var(--border);border-radius:18px;}
.section{padding:6px 16px 16px;}
.section-title{font-size:13px;text-transform:uppercase;letter-spacing:.6px;color:var(--text-dim);font-weight:700;margin:14px 4px 8px;}

/* Buttons */
.btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:13px 16px;border-radius:14px;
  border:none;font-weight:700;font-size:14.5px;cursor:pointer;transition:transform .1s;}
.btn:active{transform:scale(.98);}
.btn-primary{background:linear-gradient(135deg,var(--primary-light),var(--primary-dark));color:#fff;}
.btn-gold{background:linear-gradient(135deg,var(--gold),var(--gold-dark));color:#1a1204;}
.btn-outline{background:transparent;border:1.5px solid var(--border);color:var(--text);}
.btn-ghost{background:var(--surface);color:var(--text);}
.btn-danger{background:transparent;border:1.5px solid var(--danger);color:var(--danger);}
.btn-sm{padding:9px 12px;font-size:13px;border-radius:11px;}
.btn-row{display:flex;gap:10px;}

/* Inputs */
.field{margin-bottom:14px;}
.field label{display:block;font-size:12.5px;font-weight:600;color:var(--text-dim);margin-bottom:6px;}
.input,select.input,textarea.input{width:100%;padding:12px 13px;border-radius:12px;border:1.4px solid var(--border);
  background:var(--surface);color:var(--text);font-size:14.5px;outline:none;}
.input:focus{border-color:var(--primary-light);}
textarea.input{resize:vertical;min-height:70px;}
.input-icon-wrap{position:relative;}
.input-icon-wrap .input{padding-right:42px;}
.eye-btn{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text-dim);cursor:pointer;font-size:16px;}
.chip-row{display:flex;flex-wrap:wrap;gap:8px;}
.chip{padding:9px 14px;border-radius:20px;border:1.4px solid var(--border);background:var(--surface);font-size:13px;font-weight:600;cursor:pointer;color:var(--text-dim);}
.chip.active{background:var(--primary);border-color:var(--primary);color:#fff;}
.chip.danger.active{background:var(--danger);border-color:var(--danger);}
.chip.warn.active{background:var(--warn);border-color:var(--warn);color:#1a1204;}

/* Login */
.login-hero{text-align:center;padding:38px 24px 18px;}
.login-emblem{width:82px;height:82px;border-radius:22px;margin:0 auto 14px;display:flex;align-items:center;justify-content:center;
  background:linear-gradient(135deg,var(--gold),var(--gold-dark));font-size:38px;box-shadow:0 10px 22px rgba(0,0,0,.3);}
.login-hero h2{margin:2px 0 2px;font-size:19px;font-weight:800;letter-spacing:.3px;}
.login-hero p{margin:0;color:var(--text-dim);font-size:12.5px;}
.login-panel{margin:8px 16px;padding:22px 18px;}
.divider-text{display:flex;align-items:center;gap:10px;color:var(--text-faint);font-size:12px;margin:14px 0;}
.divider-text::before,.divider-text::after{content:"";flex:1;height:1px;background:var(--border);}
.link-text{color:var(--gold);font-size:12.5px;font-weight:600;cursor:pointer;background:none;border:none;}

/* Stats grid */
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.stat-card{padding:14px;border-radius:16px;background:var(--surface);border:1px solid var(--border-soft);}
.stat-card .num{font-size:21px;font-weight:800;}
.stat-card .lbl{font-size:11.5px;color:var(--text-dim);margin-top:2px;}
.stat-card .ic{font-size:18px;margin-bottom:6px;display:inline-block;}

/* List items */
.list-item{display:flex;align-items:center;gap:12px;padding:13px 14px;border-radius:16px;background:var(--card);
  border:1px solid var(--border-soft);margin-bottom:10px;cursor:pointer;}
.list-item:active{transform:scale(.99);}
.avatar{width:42px;height:42px;border-radius:12px;background:var(--surface-strong);display:flex;align-items:center;justify-content:center;
  font-size:18px;flex-shrink:0;}
.li-body{flex:1;min-width:0;}
.li-title{font-weight:700;font-size:14.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.li-sub{font-size:12px;color:var(--text-dim);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.badge{padding:4px 9px;border-radius:8px;font-size:10.5px;font-weight:800;flex-shrink:0;}
.badge.hadir{background:rgba(47,191,113,.18);color:var(--success);}
.badge.izin{background:rgba(224,166,60,.18);color:var(--warn);}
.badge.sakit{background:rgba(77,157,224,.18);color:var(--info);}
.badge.alfa{background:rgba(226,104,95,.18);color:var(--danger);}

/* Bottom nav */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;max-width:480px;margin:0 auto;display:flex;align-items:center;
  justify-content:space-around;padding:9px 8px calc(9px + env(safe-area-inset-bottom));background:var(--card);
  border-top:1px solid var(--border-soft);z-index:30;}
.nav-item{background:none;border:none;display:flex;flex-direction:column;align-items:center;gap:3px;color:var(--text-faint);
  font-size:10px;font-weight:600;cursor:pointer;padding:4px 8px;}
.nav-item.active{color:var(--primary-light);}
.nav-item .nic{font-size:19px;}
.nav-fab{width:50px;height:50px;border-radius:16px;background:linear-gradient(135deg,var(--primary-light),var(--primary-dark));
  display:flex;align-items:center;justify-content:center;color:#fff;font-size:24px;margin-top:-26px;box-shadow:0 8px 18px rgba(0,0,0,.35);border:3px solid var(--card);}

/* Modal / sheet */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:90;display:flex;align-items:flex-end;justify-content:center;}
.sheet{width:100%;max-width:480px;background:var(--bg-2);border-radius:22px 22px 0 0;max-height:88vh;overflow-y:auto;
  padding:18px 16px calc(24px + env(safe-area-inset-bottom));animation:slideUp .22s ease;}
@keyframes slideUp{from{transform:translateY(30px);opacity:0;}to{transform:translateY(0);opacity:1;}}
.sheet-handle{width:40px;height:4px;border-radius:3px;background:var(--border);margin:0 auto 14px;}
.toast{position:fixed;left:50%;bottom:100px;transform:translateX(-50%);background:#12281f;color:#fff;padding:12px 18px;
  border-radius:12px;font-size:13.5px;z-index:200;box-shadow:0 8px 20px rgba(0,0,0,.4);max-width:88%;text-align:center;}

/* Misc */
.empty-state{text-align:center;padding:40px 20px;color:var(--text-dim);}
.empty-state .ic{font-size:40px;margin-bottom:10px;display:block;}
.qr-box{background:#fff;border-radius:16px;padding:16px;display:flex;align-items:center;justify-content:center;margin:6px 0;}
.hr{height:1px;background:var(--border-soft);margin:14px 0;}
.search-wrap{display:flex;align-items:center;gap:8px;background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:10px 12px;}
.search-wrap input{background:none;border:none;color:var(--text);flex:1;outline:none;font-size:14px;}
canvas.sigpad{width:100%;height:150px;background:#fff;border-radius:14px;touch-action:none;}
.mini-chart{width:100%;height:130px;}
a{color:inherit;}
.k-header{padding:14px 16px 6px;}
.k-title-row{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;}
.pill-cat{background:var(--surface-strong);color:var(--gold);font-size:10.5px;font-weight:700;padding:4px 10px;border-radius:8px;}
.progress-bar{height:8px;border-radius:6px;background:var(--surface);overflow:hidden;}
.progress-bar > div{height:100%;background:linear-gradient(90deg,var(--primary-light),var(--primary));}
.copy-row{display:flex;align-items:center;gap:8px;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:11px 12px;font-size:12.5px;word-break:break-all;}
.tab-row{display:flex;gap:6px;background:var(--surface);padding:5px;border-radius:14px;margin-bottom:12px;}
.tab-row button{flex:1;padding:9px;border:none;border-radius:10px;background:none;color:var(--text-dim);font-weight:700;font-size:12.5px;cursor:pointer;}
.tab-row button.active{background:var(--primary);color:#fff;}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.upload-box{border:1.6px dashed var(--border);border-radius:14px;padding:16px;text-align:center;color:var(--text-dim);font-size:12.5px;cursor:pointer;background:var(--surface);}
.upload-box img{max-width:100%;max-height:70px;border-radius:8px;}
table.rpt{width:100%;border-collapse:collapse;font-size:11px;}
table.rpt th,table.rpt td{border:1px solid var(--border-soft);padding:6px 5px;text-align:left;}
table.rpt th{background:var(--surface-strong);}
.swatch{width:28px;height:28px;border-radius:8px;flex-shrink:0;}
@media print{ #appShell *{visibility:hidden;} #printArea, #printArea *{visibility:visible;} #printArea{position:absolute;left:0;top:0;width:100%;} }
</style>
</head>
<body>
<div id="appShell"></div>
<div id="toastHost"></div>

<script>
/* ===================== DATA LAYER ===================== */
const DB_KEY = 'phd_db_v1';
const SESSION_KEY = 'phd_session_v1';

function defaultDB(){
  return {
    login: { username:'admin', password:'admin123' },
    identitas: {
      logo:'', lambang:'', namaOrganisasi:'Majelis Al-Ikhlas', namaMasjid:'Masjid Al-Ikhlas',
      namaKelompok:'Kelompok Pengajian', namaAplikasi:'Daftar Hadir Pengajian Digital',
      footer:'© '+new Date().getFullYear()+' Majelis Al-Ikhlas', stempel:''
    },
    kategori: [
      {id:'k1', nama:'Ngaji Kelompok'},
      {id:'k2', nama:'Pengajian Muda-Mudi'},
      {id:'k3', nama:'Pengajian Ibu-Ibu'},
      {id:'k4', nama:'Pengajian Turba Kelompok'}
    ],
    kegiatan: [],
    peserta: [],
    infaq: [],
    tandaTanganPeserta: [],
    tandaTanganPenanggungJawab: {},
    banner: [],
    laporan: []
  };
}
function loadDB(){
  try{
    const raw = localStorage.getItem(DB_KEY);
    if(!raw) { const d=defaultDB(); saveDB(d); return d; }
    return JSON.parse(raw);
  }catch(e){ const d=defaultDB(); saveDB(d); return d; }
}
function saveDB(db){ localStorage.setItem(DB_KEY, JSON.stringify(db)); }
let DB = loadDB();
function persist(){ saveDB(DB); }

function uid(prefix){ return (prefix||'ID') + Math.random().toString(36).slice(2,6).toUpperCase() + Date.now().toString(36).slice(-4).toUpperCase(); }
function token(){ return Math.random().toString(36).slice(2,10) + Math.random().toString(36).slice(2,6); }
function fmtDate(iso){ if(!iso) return '-'; const d=new Date(iso); if(isNaN(d)) return iso; return d.toLocaleDateString('id-ID',{weekday:'long',day:'2-digit',month:'long',year:'numeric'}); }
function fmtDateShort(iso){ if(!iso) return '-'; const d=new Date(iso); if(isNaN(d)) return iso; return d.toLocaleDateString('id-ID',{day:'2-digit',month:'short',year:'numeric'}); }
function fmtTime(iso){ if(!iso) return '-'; const d=new Date(iso); if(isNaN(d)) return iso; return d.toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'}); }
function fmtRupiah(n){ n = Number(n)||0; return 'Rp ' + n.toLocaleString('id-ID'); }
function esc(s){ return (s==null?'':String(s)).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

function toast(msg, ms){
  const host = document.getElementById('toastHost');
  const el = document.createElement('div');
  el.className='toast'; el.textContent = msg;
  host.appendChild(el);
  setTimeout(()=>{ el.style.transition='opacity .3s'; el.style.opacity='0'; setTimeout(()=>el.remove(),300); }, ms||2200);
}

/* ===================== ROUTER / STATE ===================== */
let ROUTE = { screen:'login', params:{} };
let SESSION = null;
function checkSession(){
  try{
    const raw = localStorage.getItem(SESSION_KEY);
    if(raw){ const s = JSON.parse(raw); if(s && s.active){ SESSION = s; return true; } }
  }catch(e){}
  return false;
}
function go(screen, params){
  ROUTE = { screen, params: params||{} };
  render();
  const shell = document.getElementById('appShell');
  if(shell) shell.scrollTop = 0;
  window.scrollTo(0,0);
}

/* Handle public absensi deep link: ?id=..&token=.. */
function parseDeepLink(){
  const p = new URLSearchParams(location.search);
  if(p.get('id') && p.get('token')){
    return { id:p.get('id'), token:p.get('token') };
  }
  return null;
}

/* ===================== THEME ===================== */
function initTheme(){
  const saved = localStorage.getItem('phd_theme');
  const theme = saved || 'dark';
  document.documentElement.setAttribute('data-theme', theme);
}
function toggleTheme(){
  const cur = document.documentElement.getAttribute('data-theme');
  const next = cur==='dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('phd_theme', next);
  render();
}

/* ===================== RENDER ROOT ===================== */
function render(){
  const shell = document.getElementById('appShell');
  const dl = parseDeepLink();
  if(dl && ROUTE.screen !== 'absensiForm' && ROUTE.screen !== 'absensiSukses'){
    ROUTE = { screen:'absensiForm', params: dl };
  }
  const loggedIn = checkSession();
  let html = '';
  if(!loggedIn && ROUTE.screen !== 'absensiForm' && ROUTE.screen !== 'absensiSukses'){
    html = screenLogin();
  } else {
    switch(ROUTE.screen){
      case 'dashboard': html = screenDashboard(); break;
      case 'kegiatanList': html = screenKegiatanList(); break;
      case 'kegiatanForm': html = screenKegiatanForm(); break;
      case 'kegiatanDetail': html = screenKegiatanDetail(); break;
      case 'pesertaList': html = screenPesertaList(); break;
      case 'pesertaQr': html = screenPesertaQr(); break;
      case 'infaq': html = screenInfaq(); break;
      case 'infaqForm': html = screenInfaqForm(); break;
      case 'kategori': html = screenKategori(); break;
      case 'identitas': html = screenIdentitas(); break;
      case 'menu': html = screenMenu(); break;
      case 'laporan': html = screenLaporan(); break;
      case 'kirimWa': html = screenKirimWa(); break;
      case 'banner': html = screenBanner(); break;
      case 'scanner': html = screenScanner(); break;
      case 'akun': html = screenAkun(); break;
      case 'absensiForm': html = screenAbsensiForm(); break;
      case 'absensiSukses': html = screenAbsensiSukses(); break;
      default: html = screenDashboard();
    }
  }
  shell.innerHTML = html;
  afterRender();
}

function afterRender(){
  // signature pads
  document.querySelectorAll('.sigpad').forEach(setupSignaturePad);
  // charts
  const kh = document.getElementById('chartKehadiran'); if(kh) drawLineChart(kh, chartKehadiranData());
  const inf = document.getElementById('chartInfaq'); if(inf) drawBarChart(inf, chartInfaqData());
  // qr renders
  document.querySelectorAll('[data-qr]').forEach(el=>{
    const val = el.getAttribute('data-qr');
    el.innerHTML='';
    if(window.QRCode){ new QRCode(el, {text: val, width: parseInt(el.dataset.size||140), height: parseInt(el.dataset.size||140), correctLevel: QRCode.CorrectLevel.H}); }
    else { el.textContent = 'QR: '+val; }
  });
  document.querySelectorAll('[data-barcode]').forEach(el=>{
    const val = el.getAttribute('data-barcode');
    if(window.JsBarcode){ try{ JsBarcode(el, val, {format:'CODE128', displayValue:true, height:46, fontSize:12, margin:6}); }catch(e){} }
  });
}

/* ===================== TOP NAV / BOTTOM NAV ===================== */
function topbar(title, opts){
  opts = opts||{};
  const back = opts.back ? `<button class="icon-btn" onclick="${opts.back}">←</button>` : '';
  const right = opts.right || `<button class="icon-btn" onclick="toggleTheme()">${document.documentElement.getAttribute('data-theme')==='dark'?'☀️':'🌙'}</button>`;
  return `<div class="topbar">${back}<h1>${title}</h1>${right}</div>`;
}
function bottomNav(active){
  const items = [
    {id:'dashboard', ic:'🏠', label:'Dashboard'},
    {id:'kegiatanList', ic:'📅', label:'Kegiatan'},
    {id:'__fab__', ic:'+', label:''},
    {id:'infaq', ic:'💰', label:'Infaq'},
    {id:'menu', ic:'☰', label:'Menu'}
  ];
  return `<div class="bottom-nav">${items.map(it=>{
    if(it.id==='__fab__') return `<button class="nav-fab" onclick="go('kegiatanForm',{})">+</button>`;
    return `<button class="nav-item ${active===it.id?'active':''}" onclick="go('${it.id}',{})"><span class="nic">${it.ic}</span>${it.label}</button>`;
  }).join('')}</div>`;
}

/* ===================== LOGIN ===================== */
function screenLogin(){
  const org = DB.identitas;
  return `<div class="screen no-nav">
    <div class="login-hero">
      <div class="login-emblem">🕌</div>
      <h2>${esc(org.namaOrganisasi)}</h2>
      <p>${esc(org.namaAplikasi)}</p>
    </div>
    <div class="card login-panel">
      <div style="font-weight:700;font-size:16px;margin-bottom:2px;">Selamat Datang Kembali</div>
      <div style="color:var(--text-dim);font-size:12.5px;margin-bottom:16px;">Silakan login untuk melanjutkan</div>
      <div class="field">
        <label>Username</label>
        <input class="input" id="loginUser" placeholder="Masukkan username" value="admin">
      </div>
      <div class="field">
        <label>Password</label>
        <div class="input-icon-wrap">
          <input class="input" id="loginPass" type="password" placeholder="Masukkan password">
          <button class="eye-btn" onclick="togglePw('loginPass',this)">👁️</button>
        </div>
      </div>
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;font-size:12.5px;">

function statsAll(){

  const izin = peserta.filter(p=>p.kehadiran==='Izin/Berhalangan').length;
  const sakit = peserta.filter(p=>p.kehadiran==='Sakit').length;
  const alfa = peserta.filter(p=>p.kehadiran==='Alfa').length;
  const totalInfaq = DB.infaq.reduce((s,i)=>s+Number(i.nominal||0),0) + peserta.reduce((s,p)=>s+Number(p.infaq||0),0);
  return { totalKegiatan: kegiatan.length, totalPeserta: peserta.length, hadir, izin, sakit, alfa, totalInfaq };
}
function chartKehadiranData(){
  const days = [];
  for(let i=6;i>=0;i--){
    const d = new Date(); d.setDate(d.getDate()-i);
    const key = d.toISOString().slice(0,10);
    const label = d.toLocaleDateString('id-ID',{weekday:'short'});
    const count = DB.peserta.filter(p=>p.waktuDatang && p.waktuDatang.slice(0,10)===key && p.kehadiran==='Hadir').length;
    days.push({label, value:count});
  }
  return days;
}
function chartInfaqData(){
  const map = {};
  DB.infaq.concat(DB.peserta.filter(p=>Number(p.infaq)>0).map(p=>({tanggal:p.waktuDatang, nominal:p.infaq}))).forEach(i=>{
    if(!i.tanggal) return;
    const key = i.tanggal.slice(0,10);
    map[key] = (map[key]||0) + Number(i.nominal||0);
  });
  const keys = Object.keys(map).sort().slice(-7);
  return keys.map(k=>({label: new Date(k).toLocaleDateString('id-ID',{day:'2-digit',month:'2-digit'}), value: map[k]}));
}

/* Simple canvas line chart */
function drawLineChart(canvas, data){
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio||1;
  const w = canvas.clientWidth||300, h = canvas.clientHeight||130;
  canvas.width = w*dpr; canvas.height = h*dpr; ctx.scale(dpr,dpr);
  ctx.clearRect(0,0,w,h);
  const max = Math.max(1, ...data.map(d=>d.value));
  const padL=26, padB=20, padT=10, padR=10;
  const cw = w-padL-padR, ch = h-padT-padB;
  const style = getComputedStyle(document.documentElement);
  const primary = style.getPropertyValue('--primary-light').trim() || '#39b382';
  const textDim = style.getPropertyValue('--text-dim').trim() || '#999';
  ctx.strokeStyle = 'rgba(150,150,150,.15)'; ctx.lineWidth=1;
  for(let i=0;i<=3;i++){ const y=padT+ch*i/3; ctx.beginPath(); ctx.moveTo(padL,y); ctx.lineTo(w-padR,y); ctx.stroke(); }
  ctx.beginPath();
  data.forEach((d,i)=>{
    const x = padL + cw*i/(data.length-1||1);
    const y = padT + ch - (d.value/max)*ch;
    if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
  });
  ctx.strokeStyle = primary; ctx.lineWidth=2.5; ctx.stroke();
  data.forEach((d,i)=>{
    const x = padL + cw*i/(data.length-1||1);
    const y = padT + ch - (d.value/max)*ch;
    ctx.beginPath(); ctx.arc(x,y,3.2,0,7); ctx.fillStyle=primary; ctx.fill();
    ctx.fillStyle = textDim; ctx.font='9.5px sans-serif'; ctx.textAlign='center';
    ctx.fillText(d.label, x, h-4);
  });
}
function drawBarChart(canvas, data){
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio||1;
  const w = canvas.clientWidth||300, h = canvas.clientHeight||130;
  canvas.width = w*dpr; canvas.height = h*dpr; ctx.scale(dpr,dpr);
  ctx.clearRect(0,0,w,h);
  if(!data.length){ ctx.fillStyle='#999'; ctx.font='12px sans-serif'; ctx.textAlign='center'; ctx.fillText('Belum ada data', w/2, h/2); return; }
  const max = Math.max(1, ...data.map(d=>d.value));
  const padL=10, padB=20, padT=10, padR=10;
  const cw = w-padL-padR, ch = h-padT-padB;
  const bw = cw/data.length*0.55;
  const style = getComputedStyle(document.documentElement);
  const gold = style.getPropertyValue('--gold').trim() || '#d8b25c';
  const textDim = style.getPropertyValue('--text-dim').trim() || '#999';
  data.forEach((d,i)=>{
    const slot = cw/data.length;
    const x = padL + slot*i + (slot-bw)/2;
    const bh = (d.value/max)*ch;
    const y = padT+ch-bh;
    ctx.fillStyle = gold; ctx.beginPath(); ctx.roundRect ? ctx.roundRect(x,y,bw,bh,4) : ctx.rect(x,y,bw,bh); ctx.fill();
    ctx.fillStyle = textDim; ctx.font='9px sans-serif'; ctx.textAlign='center';
    ctx.fillText(d.label, x+bw/2, h-4);
  });
}

function saveKegiatan(id){
  const nama = document.getElementById('fNama').value.trim();
  const kategori = document.getElementById('fKategori').value;
  const tanggal = document.getElementById('fTanggal').value;
  if(!nama || !kategori || !tanggal){ toast('Nama, Kategori, dan Tanggal wajib diisi'); return; }
  const data = {
    nama, kategori, tema: document.getElementById('fTema').value.trim(),
    tanggal, jamMulai: document.getElementById('fJamMulai').value, jamSelesai: document.getElementById('fJamSelesai').value,
    tempat: document.getElementById('fTempat').value.trim(), pemateri: document.getElementById('fPemateri').value.trim(),
    pj: document.getElementById('fPj').value.trim(), dapukanPj: document.getElementById('fDapukanPj').value.trim(),
    noWaPj: document.getElementById('fNoWaPj').value.trim(), catatan: document.getElementById('fCatatan').value.trim(),
  };
  if(id){
    Object.assign(DB.kegiatan.find(x=>x.id===id), data);
    persist(); toast('Kegiatan diperbarui'); go('kegiatanDetail',{id});
  } else {
    const k = Object.assign({id: uid('KGT'), token: token(), createdAt: new Date().toISOString(), arsip:false}, data);
    DB.kegiatan.push(k); persist(); toast('Kegiatan ditambahkan'); go('kegiatanDetail',{id:k.id});
  }
}

function kegiatanStatus(k){

}

function setGender(g){ GENDER=g; document.getElementById('chipPria').classList.toggle('active', g==='Pria'); document.getElementById('chipWanita').classList.toggle('active', g==='Wanita'); }
function setKehadiran(v){
  KEHADIRAN=v;
  ['Hadir','Izin/Berhalangan','Sakit','Alfa'].forEach(s=>{
    const id = 'chip'+(s==='Izin/Berhalangan'?'Izin':s);
    document.getElementById(id).classList.toggle('active', s===v);
  });
}
function setupSignaturePad(canvas){
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio||1;
  function resize(){ const w=canvas.clientWidth, h=canvas.clientHeight; canvas.width=w*dpr; canvas.height=h*dpr; ctx.scale(dpr,dpr); ctx.lineWidth=2.2; ctx.lineCap='round'; ctx.strokeStyle='#123527'; }
  resize();
  let drawing=false, last=null;
  function pos(e){ const r=canvas.getBoundingClientRect(); const t = e.touches?e.touches[0]:e; return {x:t.clientX-r.left, y:t.clientY-r.top}; }
  function start(e){ drawing=true; last=pos(e); e.preventDefault(); }
  function move(e){ if(!drawing) return; const p=pos(e); ctx.beginPath(); ctx.moveTo(last.x,last.y); ctx.lineTo(p.x,p.y); ctx.stroke(); last=p; e.preventDefault(); }
  function end(){ drawing=false; }
  canvas.addEventListener('mousedown', start); canvas.addEventListener('mousemove', move); window.addEventListener('mouseup', end);
  canvas.addEventListener('touchstart', start, {passive:false}); canvas.addEventListener('touchmove', move, {passive:false}); canvas.addEventListener('touchend', end);
}
function clearSig(id){ const c = document.getElementById(id); const ctx=c.getContext('2d'); ctx.clearRect(0,0,c.width,c.height); }
function submitAbsensi(kegiatanId){
  const nama = document.getElementById('afNama').value.trim();
  const dapukan = document.getElementById('afDapukan').value.trim();
  const noWa = document.getElementById('afNoWa').value.trim();
  if(!nama || !dapukan || !noWa){ toast('Nama, Dapukan, dan No. WhatsApp wajib diisi'); return; }
  const canvas = document.getElementById('sigPeserta');
  const ttd = canvas.toDataURL('image/png');
  const nomorUrut = DB.peserta.filter(p=>p.kegiatanId===kegiatanId).length + 1;
  const p = {
    id: uid('PST'), kegiatanId, nomor: nomorUrut, nama, jk: GENDER,
    status: document.getElementById('afStatus').value, dapukan, noWa,
    alamat: document.getElementById('afAlamat').value.trim(),
    waktuDatang: new Date().toISOString(), kehadiran: KEHADIRAN,
    keterangan: document.getElementById('afKeterangan').value.trim(),
    infaq: Number(document.getElementById('afInfaq').value)||0, ttd
  };
  DB.peserta.push(p);
  if(p.infaq>0){ DB.infaq.push({id:uid('INF'), pesertaId:p.id, pesertaNama:p.nama, nominal:p.infaq, metode:'Tunai', keterangan:'Infaq saat absensi', tanggal:p.waktuDatang}); }
  persist();
  GENDER='Pria'; KEHADIRAN='Hadir';
  go('absensiSukses', {pesertaId:p.id});
}

function screenScanner(){

      </div>
      <div class="btn-row" style="margin-top:10px;">
        <button class="btn btn-outline" onclick="startScan()">🎥 Mulai Kamera</button>
        <button class="btn btn-outline" onclick="stopScan()">⏹️ Berhenti</button>
      </div>
      <div id="scanResult" style="margin-top:12px;"></div>
    </div>
  </div>${bottomNav('menu')}`;
}
let SCAN_STREAM=null, SCAN_RAF=null;
async function startScan(){
  try{
    const video = document.getElementById('scanVideo');
    SCAN_STREAM = await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}});
    video.srcObject = SCAN_STREAM; video.play();
    const canvas = document.createElement('canvas'); const ctx = canvas.getContext('2d');
    function tick(){
      if(video.readyState === video.HAVE_ENOUGH_DATA && window.jsQR){
        canvas.width = video.videoWidth; canvas.height = video.videoHeight;
        ctx.drawImage(video,0,0,canvas.width,canvas.height);
        const img = ctx.getImageData(0,0,canvas.width,canvas.height);
        const code = jsQR(img.data, img.width, img.height);
        if(code){ handleScanResult(code.data); stopScan(); return; }
      }
      SCAN_RAF = requestAnimationFrame(tick);
    }
    SCAN_RAF = requestAnimationFrame(tick);
  }catch(e){ toast('Tidak dapat mengakses kamera'); }
}
function stopScan(){
  if(SCAN_RAF) cancelAnimationFrame(SCAN_RAF);
  if(SCAN_STREAM){ SCAN_STREAM.getTracks().forEach(t=>t.stop()); SCAN_STREAM=null; }
}
function handleScanResult(data){
  document.getElementById('scanResult').innerHTML = `<div class="card">Hasil scan: <br><b>${esc(data)}</b></div>`;
  try{
    const url = new URL(data);
    const id = url.searchParams.get('id'), tok = url.searchParams.get('token');
    if(id && tok){ go('absensiForm', {id, token:tok}); return; }
  }catch(e){}
  toast('QR tidak dikenali sebagai link absensi');
}

let BANNER_TPL=0;
function setBannerTpl(i){ BANNER_TPL=i; [0,1,2].forEach(n=>document.getElementById('tplChip'+n).classList.toggle('active', n===i)); drawBanner(); }

function drawBanner(){
  const canvas = document.getElementById('bannerCanvas'); if(!canvas) return;
  const k = currentBannerKegiatan();
  const sizes = [{w:1000,h:520},{w:800,h:1000},{w:1080,h:1920}];
  const size = sizes[BANNER_TPL];
  canvas.width = size.w; canvas.height = size.h;
  const ctx = canvas.getContext('2d');
  const grad = ctx.createLinearGradient(0,0,size.w,size.h);
  grad.addColorStop(0,'#0d4230'); grad.addColorStop(1,'#062219');
  ctx.fillStyle = grad; ctx.fillRect(0,0,size.w,size.h);
  // decorative arch shapes
  ctx.fillStyle='rgba(216,178,92,.12)';
  ctx.beginPath(); ctx.arc(size.w*0.15, size.h*0.85, size.w*0.28, Math.PI, 0); ctx.fill();
  ctx.beginPath(); ctx.arc(size.w*0.85, size.h*0.15, size.w*0.2, 0, Math.PI*2); ctx.fill();
  if(!k){ ctx.fillStyle='#fff'; ctx.font='bold 28px sans-serif'; ctx.textAlign='center'; ctx.fillText('Belum ada kegiatan dipilih', size.w/2, size.h/2); return; }
  const cx = size.w/2;
  ctx.textAlign='center';
  ctx.fillStyle='#d8b25c'; ctx.font='bold '+(size.w*0.045)+'px sans-serif';
  ctx.fillText((k.nama||'').toUpperCase(), cx, size.h*0.22);
  ctx.fillStyle='#fff'; ctx.font='italic '+(size.w*0.028)+'px sans-serif';
  ctx.fillText('"'+(k.tema||'Menebar Kebaikan, Mempererat Ukhuwah')+'"', cx, size.h*0.29);
  ctx.font=(size.w*0.024)+'px sans-serif'; ctx.fillStyle='rgba(255,255,255,.9)';
  ctx.fillText('📅 '+fmtDate(k.tanggal), cx, size.h*0.37);
  ctx.fillText('🕐 '+(k.jamMulai||'')+' WIB - Selesai', cx, size.h*0.41);
  ctx.fillText('📍 '+(k.tempat||DB.identitas.namaMasjid), cx, size.h*0.45);
  // QR
  const qrTmp = document.createElement('div'); qrTmp.style.display='none'; document.body.appendChild(qrTmp);
  new QRCode(qrTmp, {text: absensiLink(k), width:260, height:260, correctLevel: QRCode.CorrectLevel.H});
  setTimeout(()=>{
    const inner = qrTmp.querySelector('canvas') || qrTmp.querySelector('img');
    const qrSize = size.w*0.24;
    const qx = cx - qrSize/2, qy = size.h*0.52;
    ctx.fillStyle='#fff'; ctx.beginPath(); ctx.roundRect ? ctx.roundRect(qx-14,qy-14,qrSize+28,qrSize+28,16) : ctx.rect(qx-14,qy-14,qrSize+28,qrSize+28); ctx.fill();
    if(inner) ctx.drawImage(inner, qx, qy, qrSize, qrSize);
    ctx.fillStyle='#d8b25c'; ctx.font='bold '+(size.w*0.024)+'px sans-serif';
    ctx.fillText('Scan QR Code untuk Mengisi Daftar Hadir', cx, qy+qrSize+40);
    ctx.fillStyle='rgba(255,255,255,.7)'; ctx.font=(size.w*0.018)+'px sans-serif';
    ctx.fillText(DB.identitas.namaOrganisasi, cx, size.h*0.96);
    qrTmp.remove();
  }, 120);
}
function downloadBanner(fmt){
  const canvas = document.getElementById('bannerCanvas');
  const k = currentBannerKegiatan();
  const url = canvas.toDataURL(fmt==='jpg'?'image/jpeg':'image/png', .95);
  const a = document.createElement('a'); a.href = url; a.download = `Banner_${(k?k.nama:'pengajian').replace(/\s+/g,'_')}.${fmt}`; a.click();
}

/* ===================== SHEET / MODAL HELPERS ===================== */
function openSheet(innerHtml){
  closeSheet();
  const ov = document.createElement('div'); ov.className='overlay'; ov.id='activeSheet';
  ov.onclick = (e)=>{ if(e.target===ov) closeSheet(); };
  ov.innerHTML = `<div class="sheet">${innerHtml}</div>`;
  document.body.appendChild(ov);
}
function closeSheet(){ const el = document.getElementById('activeSheet'); if(el) el.remove(); }

/* ===================== PWA MANIFEST (inline) ===================== */
(function setupManifest(){
  try{
    const manifest = {
      name: "Daftar Hadir Pengajian Digital", short_name:"Pengajian",
      start_url: ".", display:"standalone", background_color:"#062219", theme_color:"#0b3d2c",
      icons:[{src:"data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%230b3d2c'/%3E%3Ctext y='68' x='50' font-size='55' text-anchor='middle'%3E%F0%9F%95%8C%EF%B8%8F%3C/text%3E%3C/svg%3E", sizes:"192x192", type:"image/svg+xml"}]
    };
    const blob = new Blob([JSON.stringify(manifest)], {type:'application/json'});
    const link = document.createElement('link'); link.rel='manifest'; link.href = URL.createObjectURL(blob);
    document.head.appendChild(link);
  }catch(e){}
})();

/* ===================== INIT ===================== */
initTheme();
render();
</script>
